<!DOCTYPE html>
<html>
<body style="margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none;">

    <div id="uiLayer" style="position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); color: white; z-index: 10;">
        <div style="text-align: center;">
            <h1 id="title">MONSTER ARENA</h1>
            <p id="subtext">Survive 10 Waves</p>
            <button onclick="startGame()" style="padding: 20px 40px; font-size: 24px; cursor: pointer;">START</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

let gameState = 'MENU';
let player = {x: 200, y: 200, hp: 100, ammo: 50, maxAmmo: 50};
let enemies = [], bullets = [], ammoDrops = [], wave = 1, enemiesToSpawn = 5;

// Define Obstacles (Walls)
let walls = [
    {x: canvas.width * 0.2, y: canvas.height * 0.2, w: 200, h: 30},
    {x: canvas.width * 0.2, y: canvas.height * 0.8, w: 200, h: 30},
    {x: canvas.width * 0.7, y: canvas.height * 0.3, w: 30, h: canvas.height * 0.4}
];

// Joystick and Keyboard Setup
let joystick = {x: 100, y: canvas.height - 100, rad: 50, knobX: 100, knobY: canvas.height - 100, active: false, id: null};
const keys = {};

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function startGame() {
    wave = 1; player.hp = 100; player.ammo = 50; 
    enemies = []; bullets = []; ammoDrops = [];
    player.x = canvas.width / 2; player.y = canvas.height / 2;
    document.getElementById('uiLayer').style.display = 'none';
    gameState = 'PLAYING';
    spawnWave();
}

function spawnWave() {
    enemiesToSpawn = 5 + (wave * 2);
    for(let i = 0; i < enemiesToSpawn; i++) {
        enemies.push({x: Math.random()*canvas.width, y: -50, hp: 100, maxHp: 100});
    }
}

// AABB Collision Helper
function hitWall(x, y, size) {
    for(let w of walls) {
        if(x < w.x + w.w && x + size > w.x && y < w.y + w.h && y + size > w.y) return true;
    }
    return false;
}

// Input Handling
canvas.addEventListener('pointerdown', (e) => {
    if(gameState !== 'PLAYING') return;
    
    let dist = Math.hypot(e.clientX - joystick.x, e.clientY - joystick.y);
    if(dist < 100) {
        joystick.active = true;
        joystick.id = e.pointerId;
        joystick.knobX = e.clientX;
        joystick.knobY = e.clientY;
    } else {
        if(player.ammo > 0) {
            player.ammo--;
            let angle = Math.atan2(e.clientY - (player.y + 15), e.clientX - (player.x + 15));
            bullets.push({x: player.x + 15, y: player.y + 15, vx: Math.cos(angle)*10, vy: Math.sin(angle)*10});
        }
    }
});

canvas.addEventListener('pointermove', (e) => {
    if(gameState !== 'PLAYING') return;
    if(joystick.active && e.pointerId === joystick.id) {
        let dx = e.clientX - joystick.x;
        let dy = e.clientY - joystick.y;
        let dist = Math.hypot(dx, dy);
        if(dist > joystick.rad) { dx = (dx/dist) * joystick.rad; dy = (dy/dist) * joystick.rad; }
        joystick.knobX = joystick.x + dx;
        joystick.knobY = joystick.y + dy;
    }
});

function resetJoystick(e) {
    if(e.pointerId === joystick.id) {
        joystick.active = false; joystick.id = null;
        joystick.knobX = joystick.x; joystick.knobY = joystick.y;
    }
}
canvas.addEventListener('pointerup', resetJoystick);
canvas.addEventListener('pointercancel', resetJoystick);

function update() {
    if (gameState === 'PLAYING') {
        
        let prevX = player.x; let prevY = player.y;
        let speed = 5;
        
        // Movement: Keyboard & Joystick
        if(keys['KeyW'] || keys['ArrowUp']) player.y -= speed;
        if(keys['KeyS'] || keys['ArrowDown']) player.y += speed;
        if(keys['KeyA'] || keys['ArrowLeft']) player.x -= speed;
        if(keys['KeyD'] || keys['ArrowRight']) player.x += speed;
        if(joystick.active) { player.x += (joystick.knobX - joystick.x) / 10; player.y += (joystick.knobY - joystick.y) / 10; }

        // Screen Boundaries & Wall Collisions for Player
        player.x = Math.max(0, Math.min(canvas.width - 30, player.x));
        player.y = Math.max(0, Math.min(canvas.height - 30, player.y));
        if(hitWall(player.x, prevY, 30)) player.x = prevX;
        if(hitWall(prevX, player.y, 30)) player.y = prevY;

        // Enemy Logic
        enemies.forEach((e, ei) => {
            let angle = Math.atan2((player.y + 15) - (e.y + 10), (player.x + 15) - (e.x + 10));
            let ePrevX = e.x, ePrevY = e.y;
            
            e.x += Math.cos(angle) * (1 + wave * 0.1); 
            if(hitWall(e.x, ePrevY, 20)) e.x = ePrevX;
            
            e.y += Math.sin(angle) * (1 + wave * 0.1);
            if(hitWall(ePrevX, e.y, 20)) e.y = ePrevY;

            if(Math.hypot((player.x+15) - (e.x+10), (player.y+15) - (e.y+10)) < 30) player.hp -= 0.2;
        });

        // Bullet Logic
        for(let bi = bullets.length - 1; bi >= 0; bi--) {
            let b = bullets[bi];
            b.x += b.vx; b.y += b.vy;
            
            if(hitWall(b.x, b.y, 8)) { bullets.splice(bi, 1); continue; }

            for(let ei = enemies.length - 1; ei >= 0; ei--) {
                let e = enemies[ei];
                if(Math.hypot(b.x - (e.x+10), b.y - (e.y+10)) < 20) {
                    e.hp -= 50; bullets.splice(bi, 1);
                    if(e.hp <= 0) {
                        ammoDrops.push({x: e.x + 10, y: e.y + 10});
                        enemies.splice(ei, 1);
                    }
                    break;
                }
            }
        }

        // Ammo Pickup Logic
        for(let ai = ammoDrops.length - 1; ai >= 0; ai--) {
            let a = ammoDrops[ai];
            if(Math.hypot((player.x+15) - a.x, (player.y+15) - a.y) < 25) {
                player.ammo = Math.min(player.maxAmmo, player.ammo + 10);
                ammoDrops.splice(ai, 1);
            }
        }

        if(enemies.length === 0) {
            wave++;
            if(wave > 10) { gameState = 'OVER'; document.getElementById('title').innerText = "YOU WIN!"; document.getElementById('uiLayer').style.display = 'flex'; }
            else spawnWave();
        }
        if(player.hp <= 0) { gameState = 'OVER'; document.getElementById('title').innerText = "GAME OVER"; document.getElementById('uiLayer').style.display = 'flex'; }
    }

    // DRAWING //
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw Walls
    ctx.fillStyle = '#444';
    walls.forEach(w => {
        ctx.fillRect(w.x, w.y, w.w, w.h);
        ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.strokeRect(w.x, w.y, w.w, w.h);
    });

    // Draw Ammo Drops
    ammoDrops.forEach(a => {
        ctx.fillStyle = '#00ffff'; ctx.fillRect(a.x - 5, a.y - 5, 10, 10);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(a.x - 5, a.y - 5, 10, 10);
    });

    // Draw Joystick
    if (gameState === 'PLAYING') {
        ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.arc(joystick.x, joystick.y, joystick.rad, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.beginPath(); ctx.arc(joystick.knobX, joystick.knobY, 20, 0, Math.PI*2); ctx.fill();
    }

    // Draw Player (Sci-fi Character)
    ctx.save();
    ctx.translate(player.x + 15, player.y + 15);
    ctx.fillStyle = '#00ffcc'; ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#009999'; ctx.lineWidth = 3; ctx.stroke();
    ctx.fillStyle = '#222'; ctx.fillRect(-8, -12, 16, 8); // Visor
    ctx.restore();
    
    // Draw Enemies (Spiky Spinning Stars) & Health Bars
    enemies.forEach((e, ei) => {
        ctx.save();
        ctx.translate(e.x + 10, e.y + 10);
        ctx.rotate(Date.now() / 200 + ei); // Animation spin
        ctx.fillStyle = '#ff3366';
        ctx.fillRect(-10, -10, 20, 20);
        ctx.rotate(Math.PI/4);
        ctx.fillRect(-10, -10, 20, 20);
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill(); // Core eye
        ctx.restore();

        // Enemy HP
        ctx.fillStyle = 'red'; ctx.fillRect(e.x, e.y - 15, 20, 5);
        ctx.fillStyle = 'lime'; ctx.fillRect(e.x, e.y - 15, 20 * (e.hp/e.maxHp), 5);
    });

    // Draw Bullets
    ctx.fillStyle = 'yellow'; bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill(); });
    
    // Draw UI Elements (Wave, HP, Ammo)
    ctx.fillStyle = 'white'; ctx.font = "bold 20px Arial";
    ctx.fillText("WAVE: " + wave, 10, 30);
    
    // HP Bar
    ctx.fillStyle = 'gray'; ctx.fillRect(100, 15, 150, 15);
    ctx.fillStyle = 'lime'; ctx.fillRect(100, 15, 150 * (Math.max(0, player.hp)/100), 15);
    ctx.fillStyle = 'white'; ctx.fillText("HP", 260, 28);
    
    // Ammo Bar
    ctx.fillStyle = 'gray'; ctx.fillRect(100, 35, 150, 10);
    ctx.fillStyle = 'cyan'; ctx.fillRect(100, 35, 150 * (player.ammo/player.maxAmmo), 10);
    ctx.fillStyle = 'white'; ctx.font = "bold 14px Arial"; ctx.fillText("AMMO: " + player.ammo, 260, 45);
    
    requestAnimationFrame(update);
}
update();
</script>
</body>
</html>
